services:
  freva-gpt-backend:
    image: freva-gpt-backend-${FREVAGPT_INSTANCE_NAME:?Instance name must be set in the .env file to differentiate between instances}
    build:
      context: .
      dockerfile: docker/freva-gpt-backend/Dockerfile
    env_file: .env
    environment:
      FREVAGPT_DEV: ${FREVAGPT_DEV}
      FREVAGPT_DEBUG: ${FREVAGPT_DEBUG:-0}
    hostname: freva-gpt-backend-instance-${FREVAGPT_INSTANCE_NAME}
    ports:
      - "${FREVAGPT_TARGET_PORT:-8502}:${FREVAGPT_BACKEND_PORT:-8502}" # If either is unset, the default value will be used.
      - "5678:5678" # Port for debugpy
    volumes: 
      - ./cache/:/app/cache
      - ./logs/:/app/logs
    networks: 
      - freva-gpt
  rag:
    image: rag-server-${FREVAGPT_INSTANCE_NAME}
    build:
      context: .
      dockerfile: docker/rag-server/Dockerfile
    env_file: .env
    environment:
      FREVAGPT_DEV: ${FREVAGPT_DEV}
      FREVAGPT_DEBUG: ${FREVAGPT_DEBUG:-0}
      FREVAGPT_MCP_HOST: 0.0.0.0
      FREVAGPT_MCP_PORT: ${FREVAGPT_RAG_PORT:-8050}
    volumes: 
      - ./resources:/app/resources:ro
      - ./logs/:/app/logs
    networks: 
      - freva-gpt
  code:
    image: code-server-${FREVAGPT_INSTANCE_NAME}
    build:
      context: .
      dockerfile: docker/code-server/Dockerfile
    env_file: .env
    environment:
      FREVAGPT_DEV: ${FREVAGPT_DEV}
      FREVAGPT_DEBUG: ${FREVAGPT_DEBUG:-0}
      FREVAGPT_MCP_HOST: 0.0.0.0
      FREVAGPT_MCP_PORT: ${FREVAGPT_CODE_PORT:-8051}
    ports: 
      - 8051:8051
    cpus: 4
    volumes:
      - ./cache/:/app/cache
      - ./logs/:/app/logs
    networks: 
      - freva-gpt
  web-search:
    image: web-search-server-${FREVAGPT_INSTANCE_NAME}
    build:
      context: .
      dockerfile: docker/web-search-server/Dockerfile
    env_file: .env
    environment:
      FREVAGPT_DEV: ${FREVAGPT_DEV}
      FREVAGPT_DEBUG: ${FREVAGPT_DEBUG:-0}
      FREVAGPT_MCP_HOST: 0.0.0.0
      FREVAGPT_MCP_PORT: 8052
    networks: 
      - freva-gpt
    volumes:
      - ./logs/:/app/logs
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    hostname: litellm-instance-${FREVAGPT_INSTANCE_NAME}
    volumes: 
      - ./litellm_config.yaml:/app/config.yaml # Mount the local litellm_config.yaml file to the container
    command: >
      --config=/app/config.yaml
      --port=4000
      --num_workers=4
      --run_gunicorn
    env_file: .env 
    ports: 
      - "4000:4000" # Expose LiteLLM port to the host machine for direct access if needed, e.g. local dev
    networks: 
      - freva-gpt
  ollama: # Ollama is only for the backend and not accessible from the outside. Port 11434 is not exposed.
    image: ollama
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile.dev
    hostname: ollama-instance-${FREVAGPT_INSTANCE_NAME}
    networks: 
      - freva-gpt
  mongodb:
    networks:
      - freva-gpt
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: secret
    hostname: mongodb
    ports:
      - "27017:27017"
    command: --quiet --logpath /dev/null 

  freva-db:
    networks:
      - freva-gpt
    hostname: freva-db
    container_name: freva-db
    image: ghcr.io/freva-org/freva-mysql:9.3.0
    environment:
      - ROOT_PW=T3st
      - HOST=localhost
      - PROJECT=freva-dev
      - MYSQL_USER=freva
      - MYSQL_PASSWORD=T3st
      - MYSQL_DATABASE=frevadb
      - MYSQL_ROOT_PASSWORD=test_password_please_ignore
    ports:
      - "3306:3306"

  freva-vault:
    networks:
      - freva-gpt
    image: ghcr.io/freva-org/freva-vault:latest
    hostname: freva-vault
    container_name: freva-vault
    cap_add:
      - IPC_LOCK
      - SYS_NICE
    environment:
      - ROOT_PW=T3st
      - KEY_FILE=/vault/file/keys
      - VAULT_ADD_VAR_DB_DB=frevadb
      - VAULT_ADD_VAR_DB_HOST=freva-db
      - VAULT_ADD_VAR_DB_PASSWD=T3st
      - VAULT_ADD_VAR_MONGO_DB=search_stats
      - VAULT_ADD_VAR_MONGO_PASSWD=secret
      - VAULT_ADD_VAR_MONGO_USER=mongo
      - VAULT_ADD_VAR_MONGO_URL='mongodb://mongo:secret@freva-mongo:27017'

  freva-web:
    networks:
      - freva-gpt
    image: ghcr.io/freva-org/freva-web:2604.0.0
    ports:
      - "8000:8000"
    container_name: freva-web
    hostname: freva-web
    environment:
      - EVALUATION_SYSTEM_CONFIG_FILE=/data/evaluation_system.conf
      - DJANGO_SUPERUSER_PASSWORD=T3st
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - SCHEDULER_HOST=localhost
      - REDIS_HOST=freva-cache
      - CSRF_TRUSTED_ORIGINS=http://127.0.0.1,http://localhost
      - FREVA_REST_URL=http://regiklim-dev.dkrz.de:7777
      - CHAT_BOT_URL=http://freva-gpt-backend:8502
      - ACTIVATE_CHAT_BOT=1
      - STAC_BROWSER=1
      - DEV_MODE=1
      - CHAT_BOT=1
    volumes:
      - ./docker/freva.conf:/data/evaluation_system.conf

  freva-cache:
    networks:
      - freva-gpt
    image: ghcr.io/freva-org/freva-redis:latest
    hostname: freva-cache
    container_name: freva-cache


networks:
  freva-gpt:
    driver: bridge

# The subnet is not set to avoid conflicts with other potentially running networks on the same machine.
# Note: Named networks by default aren't shared between different docker-compose projects, even if they have the same name, as long as they are in separate directories.
